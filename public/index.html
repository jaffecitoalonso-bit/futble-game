<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futble | Wordle de Fútbol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="screen-start" class="screen">
        <h1>Futble</h1>
        <input type="text" id="username" placeholder="Tu Nombre">
        <div class="button-group">
            <button onclick="startSolo()" class="btn-solo">Modo Solitario</button>
            <button onclick="createRoom()" class="btn-create">Crear Sala</button>
            <div class="join-box">
                <input type="text" id="roomInput" placeholder="Código">
                <button onclick="joinRoom()" class="btn-join">Unirse</button>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="screen" style="display:none">
        <h2>SALA: <span id="display-code" style="color:#b59f3b"></span></h2>
        <p>Esperando jugadores...</p>
        <ul id="player-list"></ul>
        <button id="start-btn" style="display:none" onclick="startGame()" class="btn-create">EMPEZAR PARTIDA</button>
    </div>

    <div id="screen-game" class="screen" style="display:none">
        <div class="info-bar">
            <span id="category-badge"></span>
            <p id="word-hint"></p>
        </div>
        <div id="board"></div>
        <div id="keyboard">
            <div class="key-row" id="row-1"></div>
            <div class="key-row" id="row-2"></div>
            <div class="key-row" id="row-3"></div>
        </div>
    </div>

    <div id="screen-result" class="screen" style="display:none">
        <h1 id="winner-text"></h1>
        
        <div id="stats-solo" class="stats-container" style="display:none">
            <div class="stats-grid">
                <div class="stat-box"><b id="stat-played">0</b><br>Partidas</div>
                <div class="stat-box"><b id="stat-win-pct">0%</b><br>Victorias</div>
                <div class="stat-box"><b id="stat-streak">0</b><br>Racha</div>
            </div>
            <p>Intentos: <span id="attempts-used">0</span>/6 | Categoría: <span id="result-category"></span></p>
        </div>

        <div id="scoreboard" class="scoreboard-container" style="display:none">
            <h3>Marcador de Sala</h3>
            <div id="scoreboard-content"></div>
        </div>

        <div class="button-group">
            <button id="btn-replay" onclick="playAgain()" class="btn-replay" style="display:none">OTRA PARTIDA</button>
            <button id="btn-exit" onclick="exitGame()" class="btn-exit">SALIR AL INICIO</button>
            <p id="wait-message" style="display:none; color: #818384; margin-top:10px;">Esperando al anfitrión...</p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
